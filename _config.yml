# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.

# Theme Settings
theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "default" # "air", "aqua", "contrast", "dark", "dirt",
                                 # "neon", "mint", "plum", "sunrise",
                                 # "catppuccin_latte", "catppuccin_mocha"

# Site Settings
locale: "zh-CN"
title: "技巧博客"
subtitle: "日常开发技巧记录"
name: "Aedda"
description: "日常开发技巧记录博客"
url: "https://68110923.github.io"
baseurl: "/blog"
repository: "68110923/blog"
breadcrumbs: true
words_per_minute: 200

# Search
search: true
search_full_content: true

# Comments
comments:
  provider: "giscus"
  giscus:
    repo_id: "R_kgDOStZc1w"
    category_name: "Announcements"
    category_id: "DIC_kwDOStZc184C-PrL"
    discussion_term: "pathname"
    reactions_enabled: "1"
    theme: "preferred_color_scheme"
    strict: "0"
    input_position: "bottom"
    lang: "zh-CN"
    lazy: true

# Site Author
author:
  name: "Aedda"
  avatar: # path of avatar image, e.g. "/assets/images/bio-photo.jpg"
  bio: "日常开发技巧记录"
  location:
  email:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/68110923"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/68110923"

# Reading Files
include:
  - _pages
exclude:
  - vendor
  - .bundle
  - .sass-cache
  - node_modules
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - Rakefile
  - docs
  - tools
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Asia/Shanghai

# Pagination
paginate: 10
paginate_path: /page:num/

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      toc: true
      toc_sticky: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: false
