# ===========================================================
#  Chirpy Jekyll Theme Configuration
# ===========================================================

theme: jekyll-theme-chirpy

lang: zh-CN

collections:
  tabs:
    output: true
    sort_by: order
timezone: Asia/Shanghai

title: Aedda
tagline: 我是一只小鳄鱼
description: 我是一只小鳄鱼

url: "https://68110923.github.io"
baseurl: "/blog"
github:
  username: 68110923

avatar: "https://github.com/68110923.png"

# =====================
# Theme Mode
# =====================
theme_mode: dual  # [dark|light|dual]
# avatar: "/assets/images/avatar.svg"

# =====================
# Social
# =====================
social:
  name: Aedda
  links:
    - https://github.com/68110923

# =====================
# Comments (Giscus)
# =====================
comments:
  provider: giscus
  giscus:
    repo: 68110923/blog
    repo_id: R_kgDOStZc1w
    category: Announcements
    category_id: DIC_kwDOStZc184C-PrL
    mapping: pathname
    strict: 0
    input_position: bottom
    lang: zh-CN
    reactions_enabled: 1

# =====================
# Archives (Category & Tag pages)
# =====================
jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: category
    tag: tag
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

# =====================
# Pagination
# =====================
paginate: 10

# =====================
# SEO & Analytics
# =====================
# google_site_verification: your-verification-code

# =====================
# Markdown
# =====================
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  auto_ids: true
  hard_wrap: false
  syntax_highlighter: rouge

# =====================
# Plugins
# =====================
# =====================
# Default Front Matter
# =====================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-seo-tag

# =====================
# Exclusions
# =====================
exclude:
  - .idea
  - .git
  - .github
  - .gitignore
  - vendor
  - tools
  - docs
  - README.md
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
