<!-- Floating Controls: Day/Night Toggle + Color Scheme Switcher -->
<style>
.theme-ctrl {
  position: fixed;
  top: 5rem;
  right: 1rem;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.theme-ctrl-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--btn-border-color, #e9ecef);
  background: var(--card-bg, white);
  color: var(--text-color, #34343c);
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: transform 0.2s;
}
.theme-ctrl-btn:hover { transform: scale(1.1); }
.theme-ctrl-btn .icon-sun { display: inline; }
.theme-ctrl-btn .icon-moon { display: none; }
[data-mode="dark"] .theme-ctrl-btn .icon-sun { display: none; }
[data-mode="dark"] .theme-ctrl-btn .icon-moon { display: inline; }
.color-popup {
  position: absolute;
  top: 48px;
  right: 0;
  background: var(--card-bg, white);
  border: 1px solid var(--btn-border-color, #e9ecef);
  border-radius: 10px;
  padding: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  min-width: 170px;
}
.color-opt {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  cursor: pointer;
  border-radius: 6px;
  color: var(--text-color, #34343c);
  font-size: 14px;
}
.color-opt:hover { background: var(--sidebar-hover-bg, #f0f0f0); }
.color-opt.active { font-weight: 600; }
.color-swatch {
  display: inline-block;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 1px solid var(--btn-border-color, #ddd);
  flex-shrink: 0;
}
.mode-hint {
  font-size: 10px;
  color: var(--text-muted-color, #999);
  text-align: center;
  margin-top: 4px;
}
</style>

<script>
(function() {
  var SCHEME_KEY = 'user-scheme';
  var MODE_KEY = 'user-mode';
  var userScheme = localStorage.getItem(SCHEME_KEY);  // null=auto, or scheme id
  var userMode = localStorage.getItem(MODE_KEY);       // null=auto, or 'light'/'dark'

  var schemes = {
    default: { light: {}, dark: {} },
    forest: {
      light: { '--link-color': '#2d8a4e', '--sidebar-bg': '#f0f7f0', '--toc-highlight': '#2d8a4e', '--tag-border': '#c8e6c9', '--categories-icon-hover-color': '#2d8a4e' },
      dark:  { '--link-color': '#4caf50', '--sidebar-bg': '#1b2e1b', '--toc-highlight': '#4caf50', '--tag-border': '#2e4f2e', '--categories-icon-hover-color': '#4caf50' }
    },
    purple: {
      light: { '--link-color': '#6c5ce7', '--sidebar-bg': '#f5f0ff', '--toc-highlight': '#6c5ce7', '--tag-border': '#d5ccf0', '--categories-icon-hover-color': '#6c5ce7' },
      dark:  { '--link-color': '#a29bfe', '--sidebar-bg': '#1a1a2e', '--toc-highlight': '#a29bfe', '--tag-border': '#3d3d6b', '--categories-icon-hover-color': '#a29bfe' }
    },
    ocean: {
      light: { '--link-color': '#0066cc', '--sidebar-bg': '#e8f4fd', '--toc-highlight': '#0066cc', '--tag-border': '#b8d4e8', '--categories-icon-hover-color': '#0066cc' },
      dark:  { '--link-color': '#4dabf7', '--sidebar-bg': '#0d2137', '--toc-highlight': '#4dabf7', '--tag-border': '#1a3a5c', '--categories-icon-hover-color': '#4dabf7' }
    },
    warm: {
      light: { '--link-color': '#e17055', '--sidebar-bg': '#fdf6f0', '--toc-highlight': '#e17055', '--tag-border': '#f0d5c8', '--categories-icon-hover-color': '#e17055' },
      dark:  { '--link-color': '#ff8a65', '--sidebar-bg': '#2d1f14', '--toc-highlight': '#ff8a65', '--tag-border': '#5c3a28', '--categories-icon-hover-color': '#ff8a65' }
    },
    night: {
      light: {},  // night theme is primarily for dark mode
      dark:  { '--link-color': '#bb86fc', '--sidebar-bg': '#1a1a2e', '--toc-highlight': '#bb86fc', '--tag-border': '#3d3d6b', '--categories-icon-hover-color': '#bb86fc', '--main-bg': '#121212', '--card-bg': '#1e1e2e', '--heading-color': '#e0e0e0', '--text-color': '#c0c0c0' }
    },
    aurora: {
      light: {},
      dark:  { '--link-color': '#00bcd4', '--sidebar-bg': '#0d2137', '--toc-highlight': '#00bcd4', '--tag-border': '#004d60', '--categories-icon-hover-color': '#00bcd4', '--main-bg': '#0a1929', '--card-bg': '#0d2137', '--heading-color': '#e0e0e0', '--text-color': '#b0bec5' }
    }
  };

  var colorList = [
    { id: 'default', label: '默认', css: 'linear-gradient(135deg, #f6f8fa 50%, #1e1e1e 50%)' },
    { id: 'forest', label: '森林绿', css: 'linear-gradient(135deg, #f0f7f0 50%, #1b2e1b 50%)' },
    { id: 'purple', label: '深空紫', css: 'linear-gradient(135deg, #f5f0ff 50%, #1a1a2e 50%)' },
    { id: 'ocean', label: '海洋蓝', css: 'linear-gradient(135deg, #e8f4fd 50%, #0d2137 50%)' },
    { id: 'warm', label: '暖橙', css: 'linear-gradient(135deg, #fdf6f0 50%, #2d1f14 50%)' },
    { id: 'night', label: '暗夜紫', css: 'linear-gradient(135deg, #f0f0f0 50%, #1a1a2e 50%)' },
    { id: 'aurora', label: '极光蓝', css: 'linear-gradient(135deg, #e8f4fd 50%, #0d2137 50%)' }
  ];

  // --- helpers ---

  function getHour() { return new Date().getHours(); }

  function isDaytime() { var h = getHour(); return h >= 8 && h < 18; }

  function getActualMode() {
    if (userMode) return userMode;
    // auto by time
    return isDaytime() ? 'light' : 'dark';
  }

  function getDefaultScheme() {
    if (userScheme) return userScheme;
    // auto by time: day→warm, night→night
    return isDaytime() ? 'warm' : 'night';
  }

  // --- apply ---

  function applyScheme(name, mode) {
    var html = document.documentElement;
    var m = mode || getActualMode();
    var scheme = schemes[name];
    if (!scheme) return;

    // reset overrides
    var allKeys = {};
    Object.keys(schemes).forEach(function(k) {
      ['light','dark'].forEach(function(mm) {
        Object.keys(schemes[k][mm] || {}).forEach(function(key) { allKeys[key] = true; });
      });
    });
    Object.keys(allKeys).forEach(function(key) { html.style.removeProperty(key); });

    html.removeAttribute('data-color-scheme');

    if (name !== 'default') {
      html.setAttribute('data-color-scheme', name);
      var vars = scheme[m] || scheme.light || {};
      Object.keys(vars).forEach(function(key) { html.style.setProperty(key, vars[key]); });
    }

    updateActiveOpt(name);
  }

  function toggleMode() {
    var html = document.documentElement;
    var current = html.getAttribute('data-mode') || 'light';
    var next = (current === 'dark' || current === 'light') ? (current === 'dark' ? 'light' : 'dark') : (isDaytime() ? 'dark' : 'light');
    html.setAttribute('data-mode', next);
    // user explicitly set mode → save
    userMode = next;
    localStorage.setItem(MODE_KEY, next);
    updateModeBtn(next);
    // re-apply current scheme with new mode
    var curScheme = userScheme || getDefaultScheme();
    applyScheme(curScheme, next);
  }

  function selectScheme(id) {
    userScheme = id;
    localStorage.setItem(SCHEME_KEY, id);
    var mode = getActualMode();
    applyScheme(id, mode);
  }

  function updateActiveOpt(name) {
    document.querySelectorAll('.color-opt').forEach(function(el) {
      el.classList.toggle('active', el.dataset.scheme === name);
    });
  }

  function updateModeBtn(mode) {
    var btn = document.getElementById('mode-toggle-btn');
    if (!btn) return;
    if (mode === 'dark') {
      btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      btn.title = '切换到日间模式';
    } else {
      btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
      btn.title = '切换到夜间模式';
    }
  }

  // --- UI ---

  function createUI() {
    var container = document.createElement('div');
    container.className = 'theme-ctrl';
    container.id = 'theme-ctrl';

    // Mode toggle button (sun/moon)
    var modeBtn = document.createElement('button');
    modeBtn.className = 'theme-ctrl-btn';
    modeBtn.id = 'mode-toggle-btn';
    modeBtn.title = '切换日间/夜间模式';
    updateModeBtn(getActualMode());

    modeBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      toggleMode();
    });

    // Palette button
    var palBtn = document.createElement('button');
    palBtn.className = 'theme-ctrl-btn';
    palBtn.id = 'palette-btn';
    palBtn.title = '切换配色方案';
    palBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a9 9 0 0 0 0 18c.5 0 1-.5 1-1v-1a2 2 0 0 1 2-2h1a4 4 0 0 0 4-4A7 7 0 0 0 12 3z"/><circle cx="8" cy="10" r="1.5" fill="currentColor"/><circle cx="14" cy="8" r="1.5" fill="currentColor"/><circle cx="16" cy="14" r="1.5" fill="currentColor"/></svg>';

    var popup = document.createElement('div');
    popup.className = 'color-popup';
    popup.id = 'color-popup';
    popup.style.display = 'none';

    colorList.forEach(function(c) {
      var opt = document.createElement('div');
      opt.className = 'color-opt';
      opt.dataset.scheme = c.id;
      var swatch = document.createElement('span');
      swatch.className = 'color-swatch';
      swatch.style.background = c.css;
      var label = document.createElement('span');
      label.textContent = c.label;
      opt.appendChild(swatch);
      opt.appendChild(label);
      opt.addEventListener('click', function() {
        selectScheme(this.dataset.scheme);
        popup.style.display = 'none';
      });
      popup.appendChild(opt);
    });

    // Auto mode hint
    if (!userScheme && !userMode) {
      var hint = document.createElement('div');
      hint.className = 'mode-hint';
      hint.textContent = isDaytime() ? '☀️ 日间模式·暖橙' : '🌙 夜间模式·暗夜紫';
      popup.appendChild(hint);
    }

    container.appendChild(modeBtn);
    container.appendChild(palBtn);
    container.appendChild(popup);

    palBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      popup.style.display = popup.style.display === 'none' ? 'block' : 'none';
    });

    document.addEventListener('click', function() { popup.style.display = 'none'; });
    popup.addEventListener('click', function(e) { e.stopPropagation(); });

    document.body.appendChild(container);
  }

  // --- init ---

  function init() {
    createUI();

    // Determine initial settings
    var initScheme = getDefaultScheme();
    var initMode = getActualMode();

    // Apply mode to Chirpy
    var html = document.documentElement;
    if (!userMode) {
      // Auto mode: set data-mode based on time
      html.setAttribute('data-mode', initMode);
    }

    applyScheme(initScheme, initMode);
    updateModeBtn(initMode);

    // Observe Chirpy's built-in mode toggle (if user clicks sidebar toggle)
    var obs = new MutationObserver(function() {
      var m = html.getAttribute('data-mode');
      if (m === 'dark' || m === 'light') {
        // User used sidebar toggle → save preference
        if (!userMode) {
          userMode = m;
          localStorage.setItem(MODE_KEY, m);
        }
        updateModeBtn(m);
        applyScheme(userScheme || getDefaultScheme(), m);
      }
    });
    obs.observe(html, { attributes: true, attributeFilter: ['data-mode'] });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
