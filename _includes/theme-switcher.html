<!-- Color Scheme Switcher -->
<style>
.theme-switcher {
  position: fixed;
  top: 5rem;
  right: 1rem;
  z-index: 9999;
}
.theme-switcher-btn {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--btn-border-color, #e9ecef);
  background: var(--card-bg, white);
  color: var(--text-color, #34343c);
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: transform 0.2s;
}
.theme-switcher-btn:hover {
  transform: scale(1.1);
}
.theme-switcher-popup {
  position: absolute;
  top: 48px;
  right: 0;
  background: var(--card-bg, white);
  border: 1px solid var(--btn-border-color, #e9ecef);
  border-radius: 10px;
  padding: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  min-width: 160px;
}
.theme-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  cursor: pointer;
  border-radius: 6px;
  color: var(--text-color, #34343c);
  font-size: 14px;
}
.theme-option:hover {
  background: var(--sidebar-hover-bg, #f0f0f0);
}
.theme-option.active {
  font-weight: 600;
}
.theme-swatch {
  display: inline-block;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  border: 1px solid var(--btn-border-color, #ddd);
  flex-shrink: 0;
}
</style>

<script>
(function() {
  var STORAGE_KEY = 'color-scheme';
  var schemes = {
    default: {
      light: {},
      dark: {}
    },
    forest: {
      light: {
        '--link-color': '#2d8a4e',
        '--sidebar-bg': '#f0f7f0',
        '--toc-highlight': '#2d8a4e',
        '--tag-border': '#c8e6c9',
        '--categories-icon-hover-color': '#2d8a4e'
      },
      dark: {
        '--link-color': '#4caf50',
        '--sidebar-bg': '#1b2e1b',
        '--toc-highlight': '#4caf50',
        '--tag-border': '#2e4f2e',
        '--categories-icon-hover-color': '#4caf50'
      }
    },
    purple: {
      light: {
        '--link-color': '#6c5ce7',
        '--sidebar-bg': '#f5f0ff',
        '--toc-highlight': '#6c5ce7',
        '--tag-border': '#d5ccf0',
        '--categories-icon-hover-color': '#6c5ce7'
      },
      dark: {
        '--link-color': '#a29bfe',
        '--sidebar-bg': '#1a1a2e',
        '--toc-highlight': '#a29bfe',
        '--tag-border': '#3d3d6b',
        '--categories-icon-hover-color': '#a29bfe'
      }
    },
    ocean: {
      light: {
        '--link-color': '#0066cc',
        '--sidebar-bg': '#e8f4fd',
        '--toc-highlight': '#0066cc',
        '--tag-border': '#b8d4e8',
        '--categories-icon-hover-color': '#0066cc'
      },
      dark: {
        '--link-color': '#4dabf7',
        '--sidebar-bg': '#0d2137',
        '--toc-highlight': '#4dabf7',
        '--tag-border': '#1a3a5c',
        '--categories-icon-hover-color': '#4dabf7'
      }
    },
    warm: {
      light: {
        '--link-color': '#e17055',
        '--sidebar-bg': '#fdf6f0',
        '--toc-highlight': '#e17055',
        '--tag-border': '#f0d5c8',
        '--categories-icon-hover-color': '#e17055'
      },
      dark: {
        '--link-color': '#ff8a65',
        '--sidebar-bg': '#2d1f14',
        '--toc-highlight': '#ff8a65',
        '--tag-border': '#5c3a28',
        '--categories-icon-hover-color': '#ff8a65'
      }
    }
  };

  var colors = [
    { id: 'default', label: '默认', css: 'linear-gradient(135deg, #f6f8fa 50%, #1e1e1e 50%)' },
    { id: 'forest', label: '森林绿', css: 'linear-gradient(135deg, #f0f7f0 50%, #1b2e1b 50%)' },
    { id: 'purple', label: '深空紫', css: 'linear-gradient(135deg, #f5f0ff 50%, #1a1a2e 50%)' },
    { id: 'ocean', label: '海洋蓝', css: 'linear-gradient(135deg, #e8f4fd 50%, #0d2137 50%)' },
    { id: 'warm', label: '暖橙', css: 'linear-gradient(135deg, #fdf6f0 50%, #2d1f14 50%)' }
  ];

  function createUI() {
    var container = document.createElement('div');
    container.className = 'theme-switcher';
    container.id = 'theme-switcher';

    var btn = document.createElement('button');
    btn.className = 'theme-switcher-btn';
    btn.id = 'theme-switcher-btn';
    btn.title = '切换配色方案';
    btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a9 9 0 0 0 0 18c.5 0 1-.5 1-1v-1a2 2 0 0 1 2-2h1a4 4 0 0 0 4-4A7 7 0 0 0 12 3z"/><circle cx="8" cy="10" r="1.5" fill="currentColor"/><circle cx="14" cy="8" r="1.5" fill="currentColor"/><circle cx="16" cy="14" r="1.5" fill="currentColor"/></svg>';

    var popup = document.createElement('div');
    popup.className = 'theme-switcher-popup';
    popup.id = 'theme-switcher-popup';
    popup.style.display = 'none';

    colors.forEach(function(c) {
      var opt = document.createElement('div');
      opt.className = 'theme-option';
      opt.dataset.scheme = c.id;

      var swatch = document.createElement('span');
      swatch.className = 'theme-swatch';
      swatch.style.background = c.css;

      var label = document.createElement('span');
      label.textContent = c.label;

      opt.appendChild(swatch);
      opt.appendChild(label);

      opt.addEventListener('click', function() {
        applyScheme(this.dataset.scheme);
        popup.style.display = 'none';
      });

      popup.appendChild(opt);
    });

    container.appendChild(btn);
    container.appendChild(popup);

    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      popup.style.display = popup.style.display === 'none' ? 'block' : 'none';
    });

    document.addEventListener('click', function() {
      popup.style.display = 'none';
    });
    popup.addEventListener('click', function(e) {
      e.stopPropagation();
    });

    document.body.appendChild(container);
  }

  function getActualMode() {
    var attr = document.documentElement.getAttribute('data-mode');
    if (attr === 'dark') return 'dark';
    if (attr === 'light') return 'light';
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }

  function applyScheme(name) {
    var html = document.documentElement;
    var mode = getActualMode();
    var scheme = schemes[name];
    if (!scheme) return;
    var vars = scheme[mode] || scheme.light || {};

    html.removeAttribute('data-color-scheme');

    if (name === 'default') {
      Object.keys(schemes.forest.light).forEach(function(key) {
        html.style.removeProperty(key);
      });
      Object.keys(schemes.forest.dark).forEach(function(key) {
        html.style.removeProperty(key);
      });
    } else {
      html.setAttribute('data-color-scheme', name);
      Object.keys(vars).forEach(function(key) {
        html.style.setProperty(key, vars[key]);
      });
    }

    localStorage.setItem(STORAGE_KEY, name);
    updateActive(name);
  }

  function updateActive(name) {
    document.querySelectorAll('.theme-option').forEach(function(el) {
      el.classList.toggle('active', el.dataset.scheme === name);
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      createUI();
      applyScheme(localStorage.getItem(STORAGE_KEY) || 'default');
      var obs = new MutationObserver(function() {
        applyScheme(localStorage.getItem(STORAGE_KEY) || 'default');
      });
      obs.observe(document.documentElement, { attributes: true, attributeFilter: ['data-mode'] });
    });
  } else {
    createUI();
    applyScheme(localStorage.getItem(STORAGE_KEY) || 'default');
    var obs = new MutationObserver(function() {
      applyScheme(localStorage.getItem(STORAGE_KEY) || 'default');
    });
    obs.observe(document.documentElement, { attributes: true, attributeFilter: ['data-mode'] });
  }
})();
</script>
